version: "3.8"

services:
  # ── PostgreSQL (shared by builder + portal) ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jlstudio}
      POSTGRES_USER: ${POSTGRES_USER:-jlstudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jlstudio_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jlstudio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO S3 Storage ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── Builder (port 3001) ──
  builder:
    build:
      context: .
      dockerfile: apps/builder/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jlstudio}:${POSTGRES_PASSWORD:-jlstudio_secret}@postgres:5432/${POSTGRES_DB:-jlstudio}
      DIRECT_URL: postgresql://${POSTGRES_USER:-jlstudio}:${POSTGRES_PASSWORD:-jlstudio_secret}@postgres:5432/${POSTGRES_DB:-jlstudio}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-media}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEPLOY_NOTIFY_EMAIL: ${DEPLOY_NOTIFY_EMAIL:-}
      AUTH_SECRET: ${AUTH_SECRET_BUILDER:-change-me-builder-secret-32chars}
      NEXT_PUBLIC_APP_URL: ${BUILDER_URL:-http://localhost:3001}
      EXPORT_DIR: /var/www/sites
    volumes:
      - sites_data:/var/www/sites
    ports:
      - "3001:3001"

  # ── Portal (port 3002) ──
  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jlstudio}:${POSTGRES_PASSWORD:-jlstudio_secret}@postgres:5432/${POSTGRES_DB:-jlstudio}
      DIRECT_URL: postgresql://${POSTGRES_USER:-jlstudio}:${POSTGRES_PASSWORD:-jlstudio_secret}@postgres:5432/${POSTGRES_DB:-jlstudio}
      AUTH_SECRET: ${AUTH_SECRET_PORTAL:-change-me-portal-secret-min-32chars}
      NEXT_PUBLIC_APP_URL: ${BUILDER_URL:-http://localhost:3001}
    ports:
      - "3002:3002"

  # ── Prospector Agent (scraping + analysis worker) ──
  prospector:
    build:
      context: .
      dockerfile: apps/prospector/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jlstudio}:${POSTGRES_PASSWORD:-jlstudio_secret}@postgres:5432/${POSTGRES_DB:-jlstudio}
      PAGESPEED_API_KEY: ${PAGESPEED_API_KEY:-}
      SITE_ID: ${SITE_ID:-}

  # ── Nginx — Static sites server ──
  nginx-sites:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - sites_data:/var/www/sites:ro
      - ./nginx/sites.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - builder

volumes:
  postgres_data:
  minio_data:
  sites_data:
