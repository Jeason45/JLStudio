[variables]
NODE_OPTIONS = "--max-old-space-size=2048"
NEXT_TELEMETRY_DISABLED = "1"

[phases.install]
cmds = ["npm install -g npm@latest", "npm install"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npx prisma db push --skip-generate --accept-data-loss && npm run start"
